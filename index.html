<style>
  .heart {
    position: fixed;
    font-size: 90px;
    pointer-events: none;
    user-select: none;
  }
</style>

<script>
  const hearts = [];

  for (let i = 0; i < 10; i++) {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.textContent = "❤️";
    document.body.appendChild(heart);

    hearts.push({
      el: heart,
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6
    });
  }

  function animate() {
    hearts.forEach(h => {
      h.x += h.vx;
      h.y += h.vy;

      const size = h.el.offsetWidth;

      if (h.x <= 0 || h.x + size >= window.innerWidth) {
        h.vx *= -1;
      }

      if (h.y <= 0 || h.y + size >= window.innerHeight) {
        h.vy *= -1;
      }

      h.el.style.transform = `translate(${h.x}px, ${h.y}px)`;
    });

    requestAnimationFrame(animate);
  }


  animate();
</script>
